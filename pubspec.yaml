name: fit_flow

description: A Flutter + Firebase gym management app with class booking, memberships, and admin features.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.1
  firebase_crashlytics: ^4.3.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  cloud_functions: ^5.0.0
  intl: ^0.19.0
  google_sign_in: ^7.2.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.3
  mobile_scanner: ^6.0.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
